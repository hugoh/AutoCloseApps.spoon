[tools]
"github:orhun/git-cliff" = "latest"
actionlint = "latest"
dprint = "latest"
ghalint = "latest"
gitleaks = "latest"
hk = "latest"
lua = "5.4"
rumdl = "latest"
stylua = "latest"
taplo = "latest"
tombi = "latest"
typos = "latest"
zizmor = "latest"

[tasks.package]
run = """
rm -rf dist
mkdir -p dist/AutoCloseApps.spoon
cp init.lua LICENSE README.md dist/AutoCloseApps.spoon/
cd dist
zip -r ../AutoCloseApps.spoon.zip AutoCloseApps.spoon
cd ..
rm -rf dist
"""
description = "Build a self-contained AutoCloseApps.spoon.zip"

[tasks.test]
run = "busted test_spec.lua --verbose"

[hooks]
postinstall = ["luarocks install busted", "luarocks install luacheck"]

[settings]
experimental = true # for hooks

[env]
HK_PKL_BACKEND = "pklr"
