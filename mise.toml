[tools]
"github:orhun/git-cliff" = "2.13.1"
actionlint = "1.7.12"
pinact = "4.1.0"
biome = "2.5.4"
ghalint = "1.5.6"
gitleaks = "8.30.1"
hk = "1.52.0"
lua = "5.4"
uv = "0.11.29"
rumdl = "0.2.35"
stylua = "2.5.2"
tombi = "1.2.2"
typos = "1.48.0"
"github:owenlamont/ryl" = "0.21.0"
zizmor = "1.27.0"

[tasks.docs]
run = "uvx --from git+https://github.com/hugoh/spoon-tools spoon-generate-docs"
description = "Generate docs/docs.json and docs/index.html from docstrings"

[tasks.package]
depends = ["docs"]
run = """
rm -rf dist
mkdir -p dist/AutoCloseApps.spoon
cp init.lua LICENSE README.md docs/docs.json dist/AutoCloseApps.spoon/
cd dist
zip -r ../AutoCloseApps.spoon.zip AutoCloseApps.spoon
cd ..
rm -rf dist
"""
description = "Build a self-contained AutoCloseApps.spoon.zip (includes docs.json)"

[tasks.test]
run = "busted test_spec.lua --verbose"

[hooks]
postinstall = ["luarocks install busted", "luarocks install luacheck"]

[settings]
experimental = true
